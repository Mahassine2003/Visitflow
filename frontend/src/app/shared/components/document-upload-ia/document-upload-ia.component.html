<div class="space-y-3 rounded-lg border border-slate-200 bg-white p-3">
  <div *ngIf="showSourceChoice" class="flex flex-wrap gap-4 text-sm text-slate-700 pb-1 border-b border-slate-100">
    <label class="inline-flex items-center gap-2 cursor-pointer">
      <input type="radio" [name]="radioGroupName" [checked]="source === 'ai'" (change)="setSource('ai')" />
      <span>Validate with AI</span>
    </label>
    <label class="inline-flex items-center gap-2 cursor-pointer">
      <input type="radio" [name]="radioGroupName" [checked]="source === 'manual'" (change)="setSource('manual')" />
      <span>Manual upload (no AI)</span>
    </label>
  </div>

  <div>
    <label class="block text-sm font-medium text-slate-700 mb-1">{{ label }}</label>
    <input
      type="file"
      accept="image/*,.pdf,.doc,.docx,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
      (change)="onFileSelected($event)"
      class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-3
             file:rounded-md file:border-0 file:text-sm file:font-semibold
             file:bg-slate-700 file:text-white hover:file:bg-slate-800"
    />
  </div>

  <div *ngIf="file" class="flex flex-wrap gap-4 items-start">
    <img
      *ngIf="fileType === 'image' && previewUrl"
      [src]="previewUrl"
      alt="Preview"
      class="w-36 h-36 object-cover rounded-md border border-slate-200"
    />

    <div
      *ngIf="fileType === 'pdf'"
      class="w-36 h-36 flex flex-col items-center justify-center rounded-md border border-slate-200 bg-red-50 text-red-600 gap-1"
    >
      <span class="text-xs font-semibold">PDF</span>
      <span class="text-[10px] text-slate-500 truncate max-w-[8rem] text-center">{{ file.name }}</span>
    </div>

    <div
      *ngIf="fileType === 'word'"
      class="w-36 h-36 flex flex-col items-center justify-center rounded-md border border-slate-200 bg-blue-50 text-blue-600 gap-1"
    >
      <span class="text-xs font-semibold">Word</span>
      <span class="text-[10px] text-slate-500 truncate max-w-[8rem] text-center">{{ file.name }}</span>
    </div>

    <div class="space-y-2 min-w-[12rem]">
      <button *ngIf="source === 'ai'" type="button" class="btn-primary text-sm" (click)="detect()">
        {{ loading ? '…' : 'Analyze' }}
      </button>
      <p *ngIf="source === 'manual' && file" class="text-xs text-slate-600">
        File will be saved as <span class="font-medium">manual entry</span> (not analyzed by AI).
      </p>
      <button *ngIf="viewUrl" type="button" class="btn-outline text-sm" (click)="openFile()">View file</button>

      <div *ngIf="result" class="mt-2 text-sm space-y-1">
        <div *ngIf="result.validatedByAI">
          <span
            class="badge"
            [ngClass]="result.isValid ? 'badge-success' : 'badge-danger'"
          >
            {{ result.isValid ? 'VALID' : 'INVALID' }}
          </span>
        </div>
        <div *ngIf="!result.validatedByAI" class="text-xs font-medium text-amber-900 bg-amber-50 border border-amber-200 rounded px-2 py-1 inline-block">
          Manual — not analyzed by AI
        </div>

        <div class="text-xs text-slate-700" *ngIf="result.validatedByAI && result.year !== null && result.year !== undefined">
          Year: <span class="font-medium">{{ result.year }}</span>
        </div>

        <div class="text-xs text-slate-700" *ngIf="result.validatedByAI && result.startDate">
          Start date: <span class="font-medium">{{ result.startDate }}</span>
        </div>

        <div class="text-xs text-slate-700" *ngIf="result.validatedByAI && result.endDate">
          End date: <span class="font-medium">{{ result.endDate }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
