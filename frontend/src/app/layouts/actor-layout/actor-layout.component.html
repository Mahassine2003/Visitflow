<app-toast />
<div class="min-h-screen flex bg-background">
  <aside class="vf-sidebar w-64 text-white flex flex-col">
    <div class="vf-sidebar__logo-wrap px-4 py-4">
      <div class="flex flex-col items-center text-center gap-2">
        <img
          [src]="companyLogoUrl"
          (error)="onLogoError()"
          alt="Company logo"
          class="h-16 w-56 sm:h-20 sm:w-60 object-contain"
        />
        <div class="text-lg font-bold leading-none"></div>
      </div>
    </div>

    <div class="vf-sidebar__menu flex-1 overflow-y-auto pt-2 pr-2 pb-2 pl-4">
      <p-menu [model]="menuItems"></p-menu>
    </div>

    <div class="vf-sidebar__footer mt-auto p-3">
      <button
        type="button"
        (click)="logout()"
        class="vf-sidebar__logout w-full gap-2"
      >
        <span class="pi pi-sign-out text-xs" aria-hidden="true"></span>
        <span>Log out</span>
      </button>
    </div>
  </aside>

  <div class="flex-1 flex flex-col">
    <header class="h-14 border-b border-slate-200/70 flex items-center justify-end px-6 bg-background"></header>

    <main class="flex-1 p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
