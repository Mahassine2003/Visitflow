<div class="doc-upload-card">
  <div class="doc-upload-card__head">
    <p class="doc-upload-card__label">{{ label }}</p>
    <div *ngIf="showSourceChoice" class="mode-pills">
      <label class="mode-pill" [class.mode-pill--active]="source === 'ai'">
        <input type="radio" [name]="radioGroupName" [checked]="source === 'ai'" (change)="setSource('ai')" />
        Validate with AI
      </label>
      <label class="mode-pill" [class.mode-pill--active]="source === 'manual'">
        <input type="radio" [name]="radioGroupName" [checked]="source === 'manual'" (change)="setSource('manual')" />
        Manual upload (no AI)
      </label>
    </div>
  </div>

  <label *ngIf="!file" class="upload-zone">
    <input
      type="file"
      class="upload-zone__input"
      accept="image/*,.pdf,.doc,.docx,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
      (change)="onFileSelected($event)"
    />
    <div class="upload-zone__icon-wrap" aria-hidden="true">
      <svg class="upload-zone__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
        <polyline points="17 8 12 3 7 8" />
        <line x1="12" y1="3" x2="12" y2="15" />
      </svg>
    </div>
    <p class="upload-zone__cta">Browse files</p>
    <p class="upload-zone__hint">PDF, JPG, PNG, DOCX</p>
  </label>

  <div *ngIf="source === 'manual'" class="manual-dates">
    <div class="manual-dates__field">
      <label class="manual-dates__label" [for]="'manual-start-' + radioGroupName">Start date (optional)</label>
      <input
        class="manual-dates__input"
        type="date"
        [id]="'manual-start-' + radioGroupName"
        [(ngModel)]="manualStartDate"
        [ngModelOptions]="{ standalone: true }"
        (ngModelChange)="onManualDatesChanged()"
      />
    </div>
    <div class="manual-dates__field">
      <label class="manual-dates__label" [for]="'manual-end-' + radioGroupName">End date (optional)</label>
      <input
        class="manual-dates__input"
        type="date"
        [id]="'manual-end-' + radioGroupName"
        [(ngModel)]="manualEndDate"
        [ngModelOptions]="{ standalone: true }"
        (ngModelChange)="onManualDatesChanged()"
      />
    </div>
  </div>

  <div *ngIf="file" class="file-selected-card">
    <div class="file-selected-card__bar">
      <div class="file-selected-card__left">
        <div class="file-selected-card__file-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
          </svg>
        </div>
        <div class="file-selected-card__meta">
          <div class="file-name">{{ file.name }}</div>
          <div class="file-size">{{ formatSize(file.size) }}</div>
        </div>
      </div>
      <button type="button" class="file-selected-card__remove" (click)="clearFile()" aria-label="Remove file">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>

    <div class="file-selected-card__actions">
      <button *ngIf="source === 'ai'" type="button" class="btn-analyze" [disabled]="loading" (click)="detect()">
        <span *ngIf="loading" class="btn-analyze__spinner" aria-hidden="true"></span>
        <span>{{ loading ? 'Analyzing…' : 'Analyze' }}</span>
      </button>

      <button *ngIf="viewUrl" type="button" class="btn-view-file" (click)="openFile()">
        <svg class="btn-view-file__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
        View
      </button>

      <p *ngIf="source === 'manual'" class="manual-note">Manual entry (not analyzed by AI)</p>
    </div>

    <div *ngIf="result?.validatedByAI && result?.isValid" class="analysis-result-panel">
      <div class="analysis-result-panel__head">
        <span class="analysis-result-panel__title">AI Verified</span>
        <span class="analysis-result-panel__badge">✓ Done</span>
      </div>
      <div class="analysis-result-panel__rows">
        <div class="analysis-result-panel__row" *ngIf="result?.year !== null && result?.year !== undefined">
          <span class="analysis-result-panel__label">Year</span>
          <span class="analysis-result-panel__value">{{ result?.year }}</span>
        </div>
        <div class="analysis-result-panel__row" *ngIf="result?.startDate">
          <span class="analysis-result-panel__label">Start</span>
          <span class="analysis-result-panel__value">{{ result?.startDate }}</span>
        </div>
        <div class="analysis-result-panel__row" *ngIf="result?.endDate">
          <span class="analysis-result-panel__label">End</span>
          <span class="analysis-result-panel__value">{{ result?.endDate }}</span>
        </div>
      </div>
    </div>

    <div *ngIf="result?.validatedByAI && !result?.isValid" class="analysis-result-panel analysis-result-panel--invalid">
      <div class="analysis-result-panel__head">
        <span class="analysis-result-panel__title">AI Validation Failed</span>
      </div>
    </div>
  </div>
</div>
