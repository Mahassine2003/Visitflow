<div class="space-y-4">
  <h1 class="text-xl font-semibold text-slate-800">Documents / permits</h1>
  <div class="card max-w-2xl space-y-4">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Intervention</label>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-3 items-end">
        <div class="md:col-span-2">
          <select [(ngModel)]="selectedInterventionId" class="input w-full">
            <option [ngValue]="null">Select</option>
            <option *ngFor="let i of interventions" [ngValue]="i.id">
              #{{ i.id }} — {{ i.title }} (visit: {{ i.visitKey }})
            </option>
          </select>
        </div>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Document type</label>
      <select [(ngModel)]="form.documentType" class="input w-full">
        <option *ngFor="let t of documentTypes" [value]="t">{{ t }}</option>
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">File path</label>
      <input [(ngModel)]="form.filePath" class="input w-full" />
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Start date</label>
        <input [(ngModel)]="form.startDate" type="date" class="input w-full" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">End date</label>
        <input [(ngModel)]="form.endDate" type="date" class="input w-full" />
      </div>
    </div>
    <div>
      <label class="inline-flex items-center gap-2 text-sm text-slate-700">
        <input type="checkbox" class="h-4 w-4" [(ngModel)]="form.isValid" />
        Mark as valid
      </label>
    </div>
    <p *ngIf="message" class="text-sm" [class.text-green-600]="message.includes('saved')" [class.text-red-600]="message.includes('Error')">{{ message }}</p>

    <div class="flex flex-col sm:flex-row gap-2 sm:items-center sm:justify-between">
      <button pButton type="button" label="Save" class="p-button-primary" (click)="submit()"></button>
    </div>
  </div>
</div>
