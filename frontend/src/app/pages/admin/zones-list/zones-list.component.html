<div class="page-enter space-y-4">
  <div class="page-header">
    <div>
      <h1 class="page-title">Zones</h1>
      <p class="page-subtitle">Create and organize operational areas for interventions.</p>
    </div>
    <button pButton type="button" icon="pi pi-plus" label="New zone" class="p-button-primary" (click)="toggleForm()"></button>
  </div>
  <div *ngIf="showForm" class="card max-w-md flex gap-2 items-end flex-wrap">
    <div class="flex-1 min-w-[140px]">
      <label class="block text-sm font-medium text-slate-700 mb-1">Name</label>
      <input [(ngModel)]="form.name" class="input w-full" />
    </div>
    <div class="flex-1 min-w-[140px]">
      <label class="block text-sm font-medium text-slate-700 mb-1">Description</label>
      <input [(ngModel)]="form.description" class="input w-full" />
    </div>
    <button pButton type="button" label="Create" class="p-button-primary" [loading]="submitting" (click)="submitZone()"></button>
    <button pButton type="button" label="Cancel" class="p-button-text" (click)="toggleForm()"></button>
  </div>
  <div class="card table-scroll">
  <p-table [value]="zones" [loading]="loading" [paginator]="true" [rows]="10" dataKey="id">
    <ng-template pTemplate="header">
      <tr>
        <th>Name</th>
        <th>Description</th>
        <th class="w-40"></th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-z>
      <tr>
        <td>{{ z.name }}</td>
        <td>{{ z.description || '—' }}</td>
        <td class="text-right whitespace-nowrap space-x-1">
          <button
            type="button"
            class="btn-primary text-xs"
            (click)="openEdit(z)"
          >
            Edit
          </button>
          <button
            type="button"
            class="text-xs px-2 py-1 rounded border border-red-200 bg-red-50 text-red-700 hover:bg-red-100"
            [class.opacity-60]="deletingId === z.id"
            [disabled]="deletingId === z.id"
            (click)="deleteZone(z)"
          >
            Delete
          </button>
        </td>
      </tr>
    </ng-template>
  </p-table>
  </div>

  <p-dialog
    header="Edit zone"
    [(visible)]="editDialog"
    [modal]="true"
    [style]="{ width: 'min(480px, 95vw)' }"
    (onHide)="closeEdit()"
  >
    <div *ngIf="editing" class="space-y-3">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Name</label>
        <input [(ngModel)]="editForm.name" class="input w-full" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Description</label>
        <input [(ngModel)]="editForm.description" class="input w-full" />
      </div>
      <div class="flex gap-2 justify-end pt-2">
        <button pButton type="button" label="Cancel" class="p-button-text" (click)="closeEdit()"></button>
        <button pButton type="button" label="Save" class="p-button-primary" [loading]="editSubmitting" (click)="saveEdit()"></button>
      </div>
    </div>
  </p-dialog>
</div>
