<p-dialog
  [visible]="visible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="false"
  [style]="{ width: 'min(500px, 95vw)' }"
  appendTo="body"
  (onHide)="handleClose()"
>
  <div class="dialog-accent"></div>
  <div class="dialog-header">
    <div class="dialog-header__left">
      <span class="dialog-header__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="4"></rect>
          <path d="M3 9h18"></path>
          <path d="M9 21V9"></path>
        </svg>
      </span>
      <div>
        <h2>Create zone</h2>
        <p class="dialog-subtitle">Define a clear area name and optional details.</p>
      </div>
    </div>
    <button type="button" class="btn-close" (click)="handleClose()" [disabled]="submitting" aria-label="Close dialog">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>

  <div class="dialog-body">
    <div class="form-field">
      <label for="zone-create-name">Name</label>
      <input
        id="zone-create-name"
        name="zoneCreateName"
        #nameModel="ngModel"
        [(ngModel)]="form.name"
        [disabled]="submitting"
        required
        minlength="2"
        placeholder="Zone name"
      />
      <p class="field-error" *ngIf="nameModel.touched && nameModel.invalid">
        <ng-container *ngIf="nameModel.errors?.['required']">Name is required</ng-container>
        <ng-container *ngIf="!nameModel.errors?.['required'] && nameModel.errors?.['minlength']">Min 2 characters</ng-container>
      </p>
    </div>

    <div class="form-field">
      <label for="zone-create-description">Description</label>
      <textarea
        id="zone-create-description"
        name="zoneCreateDescription"
        [(ngModel)]="form.description"
        [disabled]="submitting"
        placeholder="Optional description"
      ></textarea>
    </div>
  </div>

  <div class="dialog-footer">
    <button type="button" class="btn-cancel" [disabled]="submitting" (click)="handleClose()">
      Cancel
    </button>
    <button type="button" class="btn-save" [disabled]="!canSave" (click)="save()">
      Save
    </button>
  </div>
</p-dialog>
