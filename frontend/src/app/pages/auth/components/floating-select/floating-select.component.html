<div
  class="vf-float vf-select"
  [class.vf-select--has-value]="!!control.value"
  [class.vf-float--error]="control.invalid && control.touched"
  [class.vf-float--ok]="showValidIcon"
>
  <div class="vf-float__inner vf-select__trigger-wrap">
    <button
      type="button"
      class="vf-select__trigger"
      [id]="inputId"
      [attr.aria-expanded]="open"
      [attr.aria-haspopup]="true"
      (click)="toggle()"
    >
      <i
        [attr.class]="
          'vf-select__icon-left ' + (selected?.icon ?? 'pi pi-briefcase')
        "
        aria-hidden="true"
      ></i>
      <span class="vf-select__value">{{ selected?.label ?? 'Select…' }}</span>
      <i class="pi pi-chevron-down vf-select__chev" aria-hidden="true"></i>
    </button>
    <label class="vf-float__label vf-select__label" [for]="inputId">{{
      label
    }}</label>
    @if (showValidIcon) {
      <i class="pi pi-check vf-float__valid" aria-hidden="true"></i>
    }
  </div>
  <div class="vf-float__underline" aria-hidden="true"></div>

  @if (open) {
    <ul class="vf-select__panel" role="listbox">
      @for (opt of options; track opt.value) {
        <li
          role="option"
          [attr.aria-selected]="control.value === opt.value"
          class="vf-select__option"
          [class.vf-select__option--active]="control.value === opt.value"
          (click)="select(opt)"
        >
          <i [attr.class]="'vf-select__opt-icon ' + opt.icon" aria-hidden="true"></i>
          <span>{{ opt.label }}</span>
        </li>
      }
    </ul>
  }
</div>
